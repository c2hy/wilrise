# 仅当推送的 tag 指向 main 上的提交且 CI 通过时才构建并发布到 PyPI
# 流程：在 develop 上 bump 版本并更新 CHANGELOG → 合并到 main → 在 main 上打 tag 并推送
name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -v

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          COMMIT_SHA=$(git rev-parse "${GITHUB_REF}^{}")
          git merge-base --is-ancestor "$COMMIT_SHA" origin/main || (echo "Tag must point to a commit on main. Merge to main first, then create and push the tag." && exit 1)

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # 使用 token 时关闭 attestations，避免与 Trusted Publishers 冲突的警告
          attestations: false
